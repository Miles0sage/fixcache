[[recipe]]
id              = "attribute-error-nonetype"
error_signature = "AttributeError: 'NoneType' object has no attribute"
tags            = ["python", "types", "none", "nullcheck"]
outcome         = "success"
fingerprint     = "c5d20b8e1a963f74"

solution_steps = [
    "Add a None guard before the attribute access: if result is not None: ...",
    "Use assert to fail fast with a clear message: assert result is not None, 'Expected <Type>, got None'",
    "Trace back to where the value is assigned — check for missing return statements in the producing function",
    "If from a dict lookup, use: obj = d.get('key') or default_obj",
    "Add a print/log just before the failing line to inspect the actual value",
]

