# ─────────────────────────────────────────────────────────────────────────────
# fixcache memory pack v1
# Format: fixcache-pack/1.0
#
# Python Starter Pack — 20 most common Python/AI agent errors with proven fixes.
#
#     fixcache pack import ./packs/python-starter.toml
# ─────────────────────────────────────────────────────────────────────────────

[pack]
name        = "python-starter"
version     = "1.0.0"
description = "20 most common Python/AI agent errors with proven fixes — imports, env, DB, ML, auth, and more"
author      = "Miles Sage <miles@fixcache.dev>"
license     = "MIT"
homepage    = "https://github.com/fixcache-registry/python-starter"

ecosystem_tags = ["python", "pip", "pytest", "docker", "fastapi", "pydantic", "sqlalchemy", "pytorch", "redis", "postgres"]
keywords       = ["modulenotfounderror", "importerror", "attributeerror", "connectionrefused", "cuda", "jwt", "ssl", "recursionerror"]

fixcache_min_version = "0.4.0"
python_min_version   = "3.9"

corpus_source   = "community"
corpus_snapshot = "2026-04-14"

[pack.stats]
total_installs   = 0
total_seen       = 0
total_success    = 0
total_failure    = 0
efficacy         = 0.0
last_updated     = "2026-04-14T00:00:00Z"

# ─────────────────────────────────────────────────────────────────────────────
# RECIPES
# ─────────────────────────────────────────────────────────────────────────────

[[recipe]]
id              = "module-not-found"
error_signature = "ModuleNotFoundError: No module named"
tags            = ["python", "import", "pip", "venv"]
outcome         = "success"
fingerprint     = "a3f8c21d9e4b7601"

solution_steps = [
    "Run: pip install <package-name>",
    "If inside a venv, verify it is activated: source .venv/bin/activate",
    "If using pyproject.toml or setup.py: pip install -e '.[dev]'",
    "Check the correct package name — PyPI name may differ from import name (e.g. 'Pillow' vs 'PIL')",
    "Verify the venv python is in use: which python",
]

[recipe.darwin_stats]
total_seen    = 0
total_success = 0
total_failure = 0
efficacy      = 0.0

