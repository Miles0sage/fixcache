    "Pin to a compatible version if upgrading breaks other things: pip install '<package>==X.Y.Z'",
    "Check the import path in the package's docs — the module may have been reorganised",
    "Search for the symbol in the installed package: python -c 'import <pkg>; help(<pkg>)'",
]

